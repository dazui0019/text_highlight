<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polarion Step Assistant</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1 class="title">Polarion 工步助手</h1>
      <p class="hint">插件会在 Polarion 工步页面右侧显示浮窗，用来切换工步并展示相对前序工步发生变化的信号。</p>
      <label class="toggle" for="assistantEnabled">
        <span class="toggle-copy">
          <span class="toggle-title">启用插件</span>
          <span class="toggle-text">关闭后当前页面不会显示工步助手浮窗。</span>
        </span>
        <span class="toggle-control">
          <input id="assistantEnabled" class="toggle-input" type="checkbox" checked>
          <span class="toggle-track" aria-hidden="true"></span>
        </span>
      </label>
      <label class="label" for="profileSelect">测试用例配置</label>
      <div class="profile-row">
        <select id="profileSelect" class="select" aria-label="测试用例配置"></select>
        <button id="addProfileButton" class="button button-secondary" type="button">新增</button>
        <button id="deleteProfileButton" class="button button-secondary" type="button">删除</button>
      </div>
      <label class="label" for="profileFeature">配置功能</label>
      <select id="profileFeature" class="select" aria-label="配置功能">
        <option value="lamp-signal-diff">LampControl 信号提取</option>
        <option value="reserved">其他用例预留</option>
      </select>
      <p id="featureDescription" class="note"></p>
      <div id="signalRegexSection">
        <label class="label" for="signalRegex">信号提取正则</label>
        <textarea
          id="signalRegex"
          class="textarea"
          spellcheck="false"
          placeholder="例如：&#10;([A-Za-z_][A-Za-z0-9_]*(?:\s*\/\s*[A-Za-z_][A-Za-z0-9_]*)*)\s*=+\s*((?:0x[0-9A-Fa-f]+|\d+)(?:\s*\/\s*(?:0x[0-9A-Fa-f]+|\d+))*)"
        ></textarea>
        <p class="note">支持两种写法：原始正则，或 `/表达式/flags`。默认按前两组捕获提取“信号名”和“信号值”。</p>
        <div class="actions">
          <button id="saveButton" class="button button-primary" type="button">保存配置</button>
          <button id="resetButton" class="button button-secondary" type="button">恢复默认</button>
        </div>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
